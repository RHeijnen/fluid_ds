<!doctype html>
<html lang="en" data-fluid-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Fluid Admin · Native</title>

    <!-- Design tokens, straight from the CDN. Always base first, then the
         scheme sheets (they key off [data-fluid-theme] on <html>, which the
         topbar toggle flips). -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fluid-ds/tokens@alpha/dist/base.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fluid-ds/tokens@alpha/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fluid-ds/tokens@alpha/dist/dark.css" />
    <!-- Brand presets. Inert until the topbar sets data-fluid-brand on <html>. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fluid-ds/themes@alpha/src/midnight.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fluid-ds/themes@alpha/src/corporate.css" />
    <link rel="stylesheet" href="./src/styles.css" />

    <!--
      Buildless CDN consumption: no bundler, no vendor step. The import map
      resolves the bare specifiers register.js imports to the published
      @fluid-ds/*@alpha packages on jsDelivr. The last entries map the runtime
      deps the Fluid dist files import (lit, floating-ui, chart.js) to esm.run,
      which resolves *their* transitive deps for us.

      To pin a release for production, swap `@alpha` for a version (e.g.
      `@0.0.2-alpha.0`).
    -->
    <script type="importmap">
      {
        "imports": {
          "@fluid-ds/components/": "https://cdn.jsdelivr.net/npm/@fluid-ds/components@alpha/dist/components/",
          "@fluid-ds/icons":       "https://cdn.jsdelivr.net/npm/@fluid-ds/icons@alpha/dist/index.js",
          "@fluid-ds/icons/":      "https://cdn.jsdelivr.net/npm/@fluid-ds/icons@alpha/dist/",
          "@fluid-ds/charts/":     "https://cdn.jsdelivr.net/npm/@fluid-ds/charts@alpha/dist/components/",

          "lit":              "https://esm.run/lit",
          "lit/":             "https://esm.run/lit/",
          "@floating-ui/dom": "https://esm.run/@floating-ui/dom",
          "chart.js":         "https://esm.run/chart.js",
          "chart.js/auto":    "https://esm.run/chart.js/auto"
        }
      }
    </script>
  </head>
  <body>
    <div id="app" aria-busy="true"></div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
