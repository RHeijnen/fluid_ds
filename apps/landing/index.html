<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Fluid: framework-agnostic web components (React, Vue, Angular, Svelte)</title>
    <meta
      name="description"
      content="Fluid is an accessible, framework-agnostic design system of 101 standard web components plus 12 expansion packs. Drop the tags into React, Vue, Angular, Svelte, or plain HTML, theme with one CSS variable, WCAG 2.2 AA (AAA opt-in). MIT licensed."
    />
    <meta
      name="keywords"
      content="web components, design system, framework-agnostic, custom elements, Lit, React, Vue, Angular, Svelte, accessible UI, WCAG 2.2, themeable, design tokens, data grid, scheduler, charts"
    />
    <meta name="author" content="Fluid contributors" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="color-scheme" content="light dark" />
    <link rel="canonical" href="https://fluid-web.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fluid" />
    <meta property="og:title" content="Fluid: framework-agnostic web components" />
    <meta
      property="og:description"
      content="101 accessible web components + 12 expansion packs. Drop into any framework or plain HTML, theme with one variable. WCAG 2.2 AA. MIT."
    />
    <meta property="og:url" content="https://fluid-web.dev/" />
    <meta property="og:image" content="https://fluid-web.dev/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Fluid: framework-agnostic web components, 101 components, 12 expansion packs." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fluid: framework-agnostic web components" />
    <meta
      name="twitter:description"
      content="101 accessible web components + 12 expansion packs. Any framework or plain HTML, themeable, WCAG 2.2 AA, MIT."
    />
    <meta name="twitter:image" content="https://fluid-web.dev/og.png" />
    <meta name="twitter:image:alt" content="Fluid: 101 web components, 12 expansion packs, WCAG 2.2 AA." />

    <!-- Structured data: helps search engines understand the product + site. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://fluid-web.dev/#website",
            "url": "https://fluid-web.dev/",
            "name": "Fluid",
            "description": "Framework-agnostic web-component design system."
          },
          {
            "@type": "SoftwareApplication",
            "name": "Fluid",
            "applicationCategory": "DeveloperApplication",
            "operatingSystem": "Web",
            "description": "An accessible, framework-agnostic design system of 101 standard web components plus 12 expansion packs. Works in React, Vue, Angular, Svelte, or plain HTML.",

            "softwareVersion": "0.0.3-alpha.0",
            "license": "https://opensource.org/licenses/MIT",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "codeRepository": "https://github.com/RHeijnen/fluid_ds"
          }
        ]
      }

    <link rel="stylesheet" href="./src/styles.css" />

    <script type="module" src="./src/main.ts"></script>
