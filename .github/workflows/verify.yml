name: verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel older runs on the same PR / branch when a new commit lands.
concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: pnpm verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright ships its own browser binaries; we need all three so the
      # cross-engine test matrix can run. The cache key bakes in the version
      # so a Playwright bump invalidates the cache cleanly.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      # The verify pipeline runs the full suite. Cross-engine is opted in
      # via FLUID_BROWSERS=all (read by packages/components/web-test-runner.config.js).
      - name: Verify (typecheck + lint + coverage + tests across 3 engines + build)
        env:
          FLUID_BROWSERS: all
        run: pnpm verify
