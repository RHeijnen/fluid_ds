# Visual regression for Fluid.
#
# Strategy: option A from the design notes, only run when component code
# changed. The baseline PNGs in `apps/visual-regression/__screenshots__/`
# are committed to the repo and are the source of truth. CI diffs against
# them; on failure, the Playwright HTML report (with side-by-side actual /
# expected / diff images) is uploaded as an artifact and a comment is
# posted on the PR with the link + instructions to refresh baselines.
#
# Baselines are generated on a developer machine via
# `pnpm test:visual:update` and committed alongside the change.

name: Visual regression

on:
  pull_request:
    paths:
      - "packages/components/**"
      - "packages/tokens/**"
      - "packages/themes/**"
      - "packages/icons/**"
      - "apps/storybook/**"
      - "apps/visual-regression/**"
      - ".github/workflows/visual-regression.yml"
  push:
    branches: [main]
    paths:
      - "packages/components/**"
      - "packages/tokens/**"
      - "packages/themes/**"
      - "packages/icons/**"
      - "apps/storybook/**"
      - "apps/visual-regression/**"
      - ".github/workflows/visual-regression.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  visual:
    name: Snapshot diff
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # We don't enable pnpm cache here because the action needs a
          # pnpm version pinned via packageManager, corepack picks it up.

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Install workspace
        run: corepack pnpm install --frozen-lockfile

      - name: Build packages
        run: corepack pnpm build

      - name: Build Storybook
        run: corepack pnpm --filter @fluid-ds/storybook build

      - name: Install Playwright browsers
        working-directory: apps/visual-regression
        run: corepack pnpm exec playwright install --with-deps chromium

      - name: Run visual regression
        id: vr
        working-directory: apps/visual-regression
        run: corepack pnpm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/visual-regression/playwright-report/
          retention-days: 14

      - name: Upload diff snapshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: apps/visual-regression/test-results/
          retention-days: 14

      - name: Comment on PR with diff link
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '### Visual regression, diffs detected',
              '',
              `The screenshot tests in [\`apps/visual-regression\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/tree/${context.sha}/apps/visual-regression) found pixel differences from the committed baselines.`,
              '',
              `- **Playwright report (side-by-side actual vs expected vs diff):** download the \`playwright-report\` artifact from [this run](${runUrl}) and open \`index.html\`.`,
              `- **Raw diff images:** download the \`visual-diffs\` artifact.`,
              '',
              'If the new look is intentional, refresh the baselines and commit them:',
              '',
              '```bash',
              'corepack pnpm --filter @fluid-ds/storybook build',
              'corepack pnpm --filter @fluid-ds/visual-regression test:update',
              'git add apps/visual-regression/__screenshots__',
              'git commit -m "test(visual): refresh baselines"',
              '```',
              '',
              'If not, the diff is a real regression, fix the component or token change that caused it.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
